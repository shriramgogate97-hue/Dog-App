version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: gogate-postgres
    environment:
      POSTGRES_USER: gogate
      POSTGRES_PASSWORD: gogate
      POSTGRES_DB: gogate_platform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gogate-redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: gogate-meilisearch
    environment:
      MEILI_MASTER_KEY: change-me
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  pg_data:
  meili_data:
